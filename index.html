
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yönetici Memnuniyet Anketi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --dark: #0d0d0d;
    --dark2: #141414;
    --dark3: #1c1c1c;
    --dark4: #242424;
    --border: rgba(201,168,76,0.2);
    --text: #e8e0d0;
    --muted: #8a8070;
    --bad: #c0392b;
    --good: #2980b9;
    --verygood: #27ae60;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 80% 80%, rgba(201,168,76,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 48px 24px 32px;
    position: relative;
  }
  .header::after {
    content: '';
    display: block;
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto 0;
  }
  .header .badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid var(--border);
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 16px;
    background: rgba(201,168,76,0.05);
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 4vw, 38px);
    font-weight: 900;
    color: #fff;
    line-height: 1.2;
  }
  .header h1 span { color: var(--gold); }
  .header p {
    color: var(--muted);
    font-size: 14px;
    margin-top: 8px;
    font-weight: 300;
  }

  /* NAV TABS */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 0 24px 32px;
  }
  .tab-btn {
    padding: 10px 28px;
    border-radius: 30px;
    border: 1px solid var(--border);
    background: var(--dark3);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.5px;
  }
  .tab-btn.active, .tab-btn:hover {
    background: var(--gold);
    color: var(--dark);
    border-color: var(--gold);
    font-weight: 600;
  }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* ===================== SURVEY VIEW ===================== */
  .survey-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  .managers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
  }

  @media (max-width: 768px) {
    .managers-grid { grid-template-columns: 1fr; }
  }

  .manager-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .manager-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(201,168,76,0.1);
  }
  .manager-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
  }

  /* MANAGER PROFILE */
  .manager-profile {
    padding: 28px 24px 20px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(201,168,76,0.05) 0%, transparent 100%);
  }
  .manager-avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    object-fit: cover;
    margin: 0 auto 14px;
    display: block;
    background: var(--dark3);
    box-shadow: 0 0 30px rgba(201,168,76,0.2);
  }
  .avatar-fallback {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    margin: 0 auto 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--dark3);
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: var(--gold);
    font-weight: 700;
    box-shadow: 0 0 30px rgba(201,168,76,0.2);
  }
  .manager-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }
  .manager-title {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
  }

  /* QUESTIONS */
  .questions-body {
    padding: 20px 24px 24px;
  }
  .question-item {
    margin-bottom: 18px;
    padding: 14px 16px;
    background: var(--dark3);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.05);
    transition: border-color 0.2s;
  }
  .question-item:hover { border-color: var(--border); }
  .question-item.answered { border-color: rgba(201,168,76,0.25); }

  .question-text {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 12px;
    font-weight: 400;
    line-height: 1.5;
  }
  .question-num {
    color: var(--gold);
    font-weight: 600;
    margin-right: 6px;
  }

  .options-row {
    display: flex;
    gap: 8px;
  }

  .opt-label {
    flex: 1;
    cursor: pointer;
  }
  .opt-label input[type="radio"] { display: none; }
  .opt-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 8px 4px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
    background: var(--dark4);
    transition: all 0.2s;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-align: center;
    line-height: 1.2;
  }
  .opt-icon { font-size: 18px; }
  .opt-label input:checked + .opt-box.bad   { background: rgba(192,57,43,0.2); border-color: var(--bad); color: #e74c3c; }
  .opt-label input:checked + .opt-box.good  { background: rgba(41,128,185,0.2); border-color: var(--good); color: #3498db; }
  .opt-label input:checked + .opt-box.vgood { background: rgba(39,174,96,0.2); border-color: var(--verygood); color: #2ecc71; }
  .opt-label:hover .opt-box.bad   { border-color: var(--bad); }
  .opt-label:hover .opt-box.good  { border-color: var(--good); }
  .opt-label:hover .opt-box.vgood { border-color: var(--verygood); }

  /* SUBMIT */
  .submit-section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px 60px;
    text-align: center;
  }
  .submit-btn {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--dark);
    border: none;
    padding: 16px 56px;
    border-radius: 30px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 8px 30px rgba(201,168,76,0.3);
    text-transform: uppercase;
  }
  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(201,168,76,0.45);
  }
  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
  .submit-hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 12px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--dark3);
    border: 1px solid var(--gold);
    color: var(--text);
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 14px;
    z-index: 999;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--verygood); }
  .toast.error { border-color: var(--bad); }

  /* ===================== REPORT VIEW ===================== */
  .report-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }
  .report-header {
    text-align: center;
    margin-bottom: 40px;
  }
  .report-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: #fff;
  }
  .report-header p { color: var(--muted); font-size: 13px; margin-top: 6px; }

  .report-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    margin-bottom: 40px;
  }
  @media(max-width:650px){ .report-grid{ grid-template-columns:1fr; } }

  .report-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    position: relative;
    overflow: hidden;
  }
  .report-card::before {
    content:'';
    position:absolute;
    top:0;left:0;right:0;
    height:3px;
    background:linear-gradient(90deg,var(--gold),var(--gold-light));
  }
  .rc-avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    object-fit: cover;
    background: var(--dark3);
    display: block;
    margin-bottom: 12px;
  }
  .rc-avatar-fb {
    width:64px;height:64px;
    border-radius:50%;
    border:2px solid var(--gold);
    background:var(--dark3);
    display:flex;align-items:center;justify-content:center;
    font-family:'Playfair Display',serif;
    font-size:22px;color:var(--gold);font-weight:700;
    margin-bottom:12px;
  }
  .rc-name {
    font-family:'Playfair Display',serif;
    font-size:18px;font-weight:700;color:#fff;
    margin-bottom:4px;
  }
  .rc-title { font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:16px; }

  .rc-stats {
    display: flex; gap: 12px; margin-bottom: 20px;
  }
  .rc-stat {
    flex:1;
    background:var(--dark3);
    border-radius:10px;
    padding:12px;
    text-align:center;
  }
  .rc-stat .val {
    font-family:'Playfair Display',serif;
    font-size:22px;font-weight:700;color:var(--gold);
    display:block;
  }
  .rc-stat .lbl { font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px; }

  .score-bar-wrap { margin-bottom:6px; }
  .score-bar-lbl { display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px; }
  .score-bar-bg { height:6px;background:var(--dark4);border-radius:3px;overflow:hidden; }
  .score-bar-fill { height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold-light));transition:width 1s ease; }

  .rc-detail-table { width:100%;border-collapse:collapse;margin-top:16px; }
  .rc-detail-table th {
    font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;
    border-bottom:1px solid var(--border);padding:6px 4px;text-align:left;
  }
  .rc-detail-table td { font-size:12px;color:var(--muted);padding:7px 4px;border-bottom:1px solid rgba(255,255,255,0.04); }
  .rc-detail-table td:last-child { text-align:right; }

  .pill {
    display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600;
  }
  .pill.bad   { background:rgba(192,57,43,0.2);color:#e74c3c; }
  .pill.good  { background:rgba(41,128,185,0.2);color:#3498db; }
  .pill.vgood { background:rgba(39,174,96,0.2);color:#2ecc71; }

  .refresh-btn {
    display:inline-flex;align-items:center;gap:8px;
    background:var(--dark3);border:1px solid var(--border);
    color:var(--gold);padding:10px 24px;border-radius:20px;
    font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
    cursor:pointer;transition:all 0.3s;margin-bottom:30px;
  }
  .refresh-btn:hover { border-color:var(--gold);background:rgba(201,168,76,0.08); }

  .loading-spinner {
    display:flex;align-items:center;justify-content:center;
    padding:60px;gap:12px;color:var(--muted);font-size:14px;
  }
  .spinner {
    width:20px;height:20px;border:2px solid var(--border);
    border-top-color:var(--gold);border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .empty-state {
    text-align:center;padding:60px 20px;color:var(--muted);
  }
  .empty-state .icon { font-size:40px;margin-bottom:12px; }
  .empty-state p { font-size:14px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="badge">📋 Personel Değerlendirmesi</div>
  <h1>Yönetici <span>Memnuniyet</span> Anketi</h1>
  <p>Yöneticilerinizi 10 soru üzerinden değerlendirin</p>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('survey')">Ankete Katıl</button>
  <button class="tab-btn" onclick="switchTab('report')">Sonuç Raporu</button>
</div>

<!-- ===================== SURVEY VIEW ===================== -->
<div id="view-survey" class="view active">
  <div class="survey-container">
    <div class="managers-grid">

      <!-- MANAGER 1: SİNAN TÜRKEL -->
      <div class="manager-card">
        <div class="manager-profile">
          <img src="sinan.jpg" class="manager-avatar" alt="Sinan Türkel"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="avatar-fallback" style="display:none">ST</div>
          <div class="manager-name">Sinan Türkel</div>
          <div class="manager-title">Müdür</div>
        </div>
        <div class="questions-body" id="questions-sinan"></div>
      </div>

      <!-- MANAGER 2: MEHMET GÜNAYDIM -->
      <div class="manager-card">
        <div class="manager-profile">
          <img src="mehmet.jpg" class="manager-avatar" alt="Mehmet Günaydın"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="avatar-fallback" style="display:none">MG</div>
          <div class="manager-name">Mehmet Günaydın</div>
          <div class="manager-title">Vekil Harç</div>
        </div>
        <div class="questions-body" id="questions-mehmet"></div>
      </div>

    </div>
  </div>

  <div class="submit-section">
    <button class="submit-btn" id="submitBtn" onclick="submitSurvey()">Anketi Gönder</button>
    <div class="submit-hint">Tüm soruları yanıtladıktan sonra gönderebilirsiniz.</div>
  </div>
</div>

<!-- ===================== REPORT VIEW ===================== -->
<div id="view-report" class="view">
  <div class="report-container">
    <div class="report-header">
      <h2>Değerlendirme Raporu</h2>
      <p>Firebase veritabanından anlık veriler</p>
    </div>
    <div style="text-align:center">
      <button class="refresh-btn" onclick="loadReport()">⟳ Yenile</button>
    </div>
    <div id="report-content">
      <div class="loading-spinner"><div class="spinner"></div> Yükleniyor...</div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbwCl4dKOV7w9e1enR_pxG8GyNIbmzCNs",
  authDomain: "cokluhaber-dc6ff.firebaseapp.com",
  projectId: "cokluhaber-dc6ff",
  storageBucket: "cokluhaber-dc6ff.firebasestorage.app",
  messagingSenderId: "433806685700",
  appId: "1:433806685700:web:8bedc51407c6c4b56f2751",
  measurementId: "G-TYRTT351HP",
  databaseURL: "https://cokluhaber-dc6ff-default-rtdb.firebaseio.com/"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

window._db  = db;
window._ref = ref;
window._push = push;
window._get  = get;

// Build questions after firebase loads
buildQuestions();
</script>

<script>
const QUESTIONS = [
  "Yöneticinizin iletişim becerilerini nasıl değerlendirirsiniz?",
  "Yöneticinizin liderlik yaklaşımı sizi motive ediyor mu?",
  "Yöneticiniz geri bildirim verme konusunda ne kadar başarılıdır?",
  "Yöneticinizin problem çözme becerisini nasıl buluyorsunuz?",
  "Yöneticiniz çalışanlara karşı adil ve eşit davranıyor mu?",
  "Yöneticinizin karar alma süreci ne kadar etkindir?",
  "Yöneticiniz ekip çalışmasını ne ölçüde teşvik ediyor?",
  "Yöneticinizin yenilikçi fikirlere açıklığını nasıl buluyorsunuz?",
  "Yöneticinizle kurduğunuz genel ilişkiyi nasıl değerlendirirsiniz?",
  "Yöneticinizin iş hedeflerini belirleme ve takip etme becerisi nasıldır?"
];

const MANAGERS = ['sinan','mehmet'];
const SCORE_MAP = { bad: 1, good: 2, vgood: 3 };
const LABEL_MAP = { bad: '😞 Kötü', good: '😊 İyi', vgood: '🌟 Çok İyi' };

function buildQuestions() {
  MANAGERS.forEach(mgr => {
    const container = document.getElementById(`questions-${mgr}`);
    let html = '';
    QUESTIONS.forEach((q, i) => {
      html += `
        <div class="question-item" id="qi-${mgr}-${i}">
          <div class="question-text">
            <span class="question-num">${i+1}.</span>${q}
          </div>
          <div class="options-row">
            ${['bad','good','vgood'].map(opt => `
              <label class="opt-label">
                <input type="radio" name="${mgr}-q${i}" value="${opt}"
                  onchange="markAnswered('${mgr}',${i})">
                <div class="opt-box ${opt}">
                  <span class="opt-icon">${opt==='bad'?'😞':opt==='good'?'😊':'🌟'}</span>
                  <span>${opt==='bad'?'Kötü':opt==='good'?'İyi':'Çok İyi'}</span>
                </div>
              </label>`).join('')}
          </div>
        </div>`;
    });
    container.innerHTML = html;
  });
}

function markAnswered(mgr, idx) {
  document.getElementById(`qi-${mgr}-${idx}`).classList.add('answered');
}

function getAnswers(mgr) {
  const answers = {};
  let allAnswered = true;
  QUESTIONS.forEach((_, i) => {
    const sel = document.querySelector(`input[name="${mgr}-q${i}"]:checked`);
    if (sel) answers[i] = sel.value;
    else allAnswered = false;
  });
  return { answers, allAnswered };
}

async function submitSurvey() {
  const btn = document.getElementById('submitBtn');

  const s = getAnswers('sinan');
  const m = getAnswers('mehmet');

  if (!s.allAnswered || !m.allAnswered) {
    showToast('⚠️ Lütfen tüm soruları yanıtlayın!', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Gönderiliyor...';

  try {
    const db   = window._db;
    const ref  = window._ref;
    const push = window._push;

    const timestamp = Date.now();

    // Sinan için kayıt
    const sinanScores = {};
    Object.entries(s.answers).forEach(([k,v]) => { sinanScores[k] = SCORE_MAP[v]; });
    await push(ref(db, 'anket/sinan'), {
      timestamp,
      answers: s.answers,
      scores: sinanScores,
      avg: Object.values(sinanScores).reduce((a,b)=>a+b,0) / QUESTIONS.length
    });

    // Mehmet için kayıt
    const mehmetScores = {};
    Object.entries(m.answers).forEach(([k,v]) => { mehmetScores[k] = SCORE_MAP[v]; });
    await push(ref(db, 'anket/mehmet'), {
      timestamp,
      answers: m.answers,
      scores: mehmetScores,
      avg: Object.values(mehmetScores).reduce((a,b)=>a+b,0) / QUESTIONS.length
    });

    showToast('✅ Anket başarıyla gönderildi!', 'success');
    btn.textContent = '✓ Gönderildi';
    setTimeout(() => { btn.disabled = false; btn.textContent = 'Anketi Gönder'; resetForm(); }, 3000);

  } catch(e) {
    console.error(e);
    showToast('❌ Hata oluştu: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Anketi Gönder';
  }
}

function resetForm() {
  document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
  document.querySelectorAll('.question-item').forEach(el => el.classList.remove('answered'));
}

// ===================== REPORT =====================
async function loadReport() {
  const content = document.getElementById('report-content');
  content.innerHTML = '<div class="loading-spinner"><div class="spinner"></div> Yükleniyor...</div>';

  try {
    const db  = window._db;
    const ref = window._ref;
    const get = window._get;

    const snap = await get(ref(db, 'anket'));
    if (!snap.exists()) {
      content.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>Henüz anket verisi bulunmuyor.</p></div>`;
      return;
    }

    const data = snap.val();

    const managers = [
      { key:'sinan',  name:'Sinan Türkel',   title:'Müdür', img:'sinan.jpg',  initials:'ST' },
      { key:'mehmet', name:'Mehmet Günaydın', title:'Vekil Harç', img:'mehmet.jpg', initials:'MG' }
    ];

    let html = '<div class="report-grid">';
    managers.forEach(mgr => {
      const entries = data[mgr.key] ? Object.values(data[mgr.key]) : [];
      const count = entries.length;
      const avgOverall = count > 0
        ? (entries.reduce((s,e) => s + (e.avg||0), 0) / count).toFixed(2)
        : '—';
      const pct = count > 0 ? ((parseFloat(avgOverall)/3)*100).toFixed(0) : 0;

      // Per-question breakdown
      const qTotals = {};
      const qCounts = { bad:{}, good:{}, vgood:{} };
      QUESTIONS.forEach((_,i) => { qTotals[i]=0; qCounts.bad[i]=0; qCounts.good[i]=0; qCounts.vgood[i]=0; });
      entries.forEach(e => {
        if (!e.answers) return;
        Object.entries(e.answers).forEach(([qi,val]) => {
          qTotals[qi] += SCORE_MAP[val]||0;
          if (qCounts[val]) qCounts[val][qi]++;
        });
      });

      const tableRows = QUESTIONS.map((q,i) => {
        const qAvg = count > 0 ? (qTotals[i]/count).toFixed(2) : '—';
        const dominant = count > 0
          ? Object.entries(qCounts).sort((a,b) => (b[1][i]||0)-(a[1][i]||0))[0][0]
          : null;
        return `<tr>
          <td>${i+1}. ${q.substring(0,28)}…</td>
          <td>${qAvg}</td>
          <td>${dominant ? `<span class="pill ${dominant}">${LABEL_MAP[dominant]}</span>` : '—'}</td>
        </tr>`;
      }).join('');

      html += `
        <div class="report-card">
          <img src="${mgr.img}" class="rc-avatar" alt="${mgr.name}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="rc-avatar-fb" style="display:none">${mgr.initials}</div>
          <div class="rc-name">${mgr.name}</div>
          <div class="rc-title">${mgr.title}</div>

          <div class="rc-stats">
            <div class="rc-stat">
              <span class="val">${count}</span>
              <span class="lbl">Katılımcı</span>
            </div>
            <div class="rc-stat">
              <span class="val">${avgOverall}</span>
              <span class="lbl">Ort. Puan</span>
            </div>
            <div class="rc-stat">
              <span class="val">${pct}%</span>
              <span class="lbl">Başarı</span>
            </div>
          </div>

          <div class="score-bar-wrap">
            <div class="score-bar-lbl"><span>Genel Başarı</span><span>${pct}%</span></div>
            <div class="score-bar-bg">
              <div class="score-bar-fill" style="width:${pct}%"></div>
            </div>
          </div>

          <table class="rc-detail-table">
            <thead><tr><th>Soru</th><th>Ort.</th><th>Baskın Yanıt</th></tr></thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>`;
    });

    html += '</div>';
    content.innerHTML = html;

  } catch(e) {
    console.error(e);
    content.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Veri yüklenemedi: ${e.message}</p></div>`;
  }
}

// ===================== TABS =====================
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

  event.currentTarget.classList.add('active');
  document.getElementById(`view-${tab}`).classList.add('active');

  if (tab === 'report') loadReport();
}

// ===================== TOAST =====================
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => { t.className = 'toast'; }, 3500);
}

// Expose globals
window.switchTab     = switchTab;
window.submitSurvey  = submitSurvey;
window.markAnswered  = markAnswered;
window.loadReport    = loadReport;
</script>
